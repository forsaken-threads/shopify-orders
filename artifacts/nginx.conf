server {
    # we use port 80 here to work with our docker config but you can configure it to any port you want, just remember to update the dockerfile accordingly
    listen 80;
    server_name utility.decantalize.com;

    keepalive_timeout  65;
    client_header_timeout 15;
    client_body_timeout 300;
    send_timeout 300;
    proxy_connect_timeout 10;
    proxy_read_timeout 300;
    proxy_send_timeout 300;

    index index.php index.html;
    root /var/www/utility/public;

    # custom error pages
    error_page 401 /401.php;
    error_page 404 /404.php;

    # deny common credential fishing attempts
    location ~* \.(env|json|sql|log|ini|bak|sh|yml|yaml)$ {
        deny all;
        return 404;
    }

    # deny hidden files (.htaccess, .git, etc)
    location ~ /\. {
        deny all;
        return 404;
    }

    # deny common probed paths explicitly
    location ~* /(\.git|\.env|wp-admin|wp-login|phpmyadmin|adminer) {
        deny all;
        return 404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SERVER_NAME $host;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
