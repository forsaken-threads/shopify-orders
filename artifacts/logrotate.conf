# logrotate config for shopify-orders sync logs
# Install: sudo scripts/publish-artifacts.sh

/home/redrover/environments/php84/src/utility/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 redrover redrover
    dateext
    dateformat -%Y%m%d
}
